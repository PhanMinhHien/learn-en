<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>English Journey v1.7</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="loginScreen" class="login-screen">
      <div class="login-card">
        <h1>📚 English Journey</h1>
        <h2>Welcome Back!</h2>
        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="username">Username:</label>
            <input 
              type="text" 
              id="username" 
              placeholder="Enter your username" 
              required
              autocomplete="off"
            />
          </div>
          <div class="form-group">
            <label for="password">Password:</label>
            <input 
              type="password" 
              id="password" 
              placeholder="Enter your password" 
              required
              autocomplete="off"
            />
          </div>
          <button type="submit" class="login-btn">Sign In</button>
        </form>
      </div>
    </div>

    <div id="appScreen" class="app-screen" style="display: none;">
      <button id="menuToggle" class="menu-toggle" aria-label="Toggle menu">☰</button>
      <div id="menuBackdrop"></div>
    <aside>
      <!-- <h1>📚 English</h1> -->
      <div class="user-info">
        <p id="userGreeting">Welcome!</p>
        <button onclick="handleLogout()" class="logout-btn">🚪 Logout</button>
      </div>

      <button data-lesson="grammar" onclick="loadLesson('grammar')">📘 Grammar</button>

      <button data-lesson="vocabulary" onclick="loadLesson('vocabulary')">📚 Vocabulary</button>

      <button data-lesson="collocation" onclick="loadLesson('collocation')">🔗 Collocations</button>

      <button data-lesson="phrasal" onclick="loadLesson('phrasal')">⚡ Phrasal Verbs</button>

      <button data-lesson="quiz" onclick="startQuiz()">📝 Quiz</button>
      <button data-lesson="notes" onclick="showNotes()">
      
📌 My Notes
</button>
  <button onclick="exportKeys()">
Export English Journey Keys
</button>
    </aside>

    <main>
      <section class="stats">
        <div class="stat-card">
          <div class="stat-icon">📘</div>

          <div>
            <span> Grammar </span>

            <h2 id="grammarCount">0</h2>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon">📚</div>

          <div>
            <span> Vocabulary </span>

            <h2 id="vocabCount">0</h2>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon">🔗</div>

          <div>
            <span> Collocations </span>

            <h2 id="collocationCount">0</h2>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon">⚡</div>

          <div>
            <span> Phrasal Verbs </span>

            <h2 id="phrasalCount">0</h2>
          </div>
        </div>
      </section>

      <section id="content">
        <div class="welcome">
          <h2>Welcome to English Journey 🚀</h2>

          <p>Choose a lesson to start learning.</p>
        </div>
      </section>
    </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
